version: "3.9"

networks:
  portfolio_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio}
      POSTGRES_USER: ${DB_USER:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - portfolio_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio} -d ${DB_NAME:-portfolio}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_secret}", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - portfolio_net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # DB Admin UI
  adminer:
    image: adminer:4
    container_name: portfolio_adminer
    restart: unless-stopped
    ports:
      - "8085:8080"
    networks:
      - portfolio_net
    depends_on:
      - postgres

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: portfolio_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DATABASE_URL=postgres://portfolio:portfolio_secret@postgres:5432/portfolio?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_URL=redis://:redis_secret@redis:6379/0
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - /app/tmp # air build output
    networks:
      - portfolio_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: portfolio_frontend
    restart: unless-stopped
    environment:
      - API_URL=${API_URL:-http://backend:8080}
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - portfolio_net
    depends_on:
      - backend
